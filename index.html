  <style>
    /* ── Lock page to viewport, no scroll ── */
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    /* ── Hero: full-screen split layout ── */
    #hero {
      display: flex;
      height: 100vh;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    /* ── LEFT PANEL — 60% dark content area ── */
    .hero-left {
      width: 60%;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 6% 0 8%;
      position: relative;
      z-index: 2;
    }

    /* Subtle diagonal clip to blend into photo panel */
    .hero-left::after {
      content: '';
      position: absolute;
      top: 0;
      right: -40px;
      width: 80px;
      height: 100%;
      background: #0a0a0a;
      clip-path: polygon(0 0, 40px 0, 100% 100%, 0 100%);
      z-index: 3;
    }

    .hero-left h2 {
      font-size: clamp(2rem, 4vw, 3.4rem);
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 0.5rem;
      line-height: 1.15;
    }

    .hero-left p {
      font-size: clamp(0.95rem, 1.8vw, 1.25rem);
      color: rgba(255,255,255,0.75);
      margin-bottom: 1.8rem;
    }

    .hero-left .typed {
      color: var(--accent-color, #27ae60);
    }

    .hero-left .typed-cursor {
      color: var(--accent-color, #27ae60);
    }

    .hero-left .social-links {
      display: flex;
      gap: 14px;
    }

    .hero-left .social-links a {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.75);
      font-size: 1.1rem;
      transition: border-color 0.3s, color 0.3s, background 0.3s;
      text-decoration: none;
    }

    .hero-left .social-links a:hover {
      border-color: var(--accent-color, #27ae60);
      color: var(--accent-color, #27ae60);
      background: rgba(39,174,96,0.1);
    }

    /* ── RIGHT PANEL — 40% portrait photo ── */
    .hero-right {
      width: 40%;
      position: relative;
      overflow: hidden;
    }

    .hero-right img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 15%;  /* crops to focus on face */
      display: block;
      filter: grayscale(15%) contrast(1.05);
    }

    /* Gradient fade on left edge of photo to blend with dark panel */
    .hero-right::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 120px;
      height: 100%;
      background: linear-gradient(to right, #0a0a0a 0%, transparent 100%);
      z-index: 2;
    }

    /* Subtle bottom fade */
    .hero-right::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 80px;
      background: linear-gradient(to top, rgba(10,10,10,0.5) 0%, transparent 100%);
      z-index: 2;
    }

    /* ── Mobile: stack vertically ── */
    @media (max-width: 768px) {
      html, body { overflow: auto; }
      #hero { flex-direction: column; height: auto; min-height: 100vh; }
      .hero-left { width: 100%; padding: 100px 8% 40px; }
      .hero-left::after { display: none; }
      .hero-right { width: 100%; height: 50vw; max-height: 320px; }
      .hero-right::before { display: none; }
    }
  </style>
</head>
