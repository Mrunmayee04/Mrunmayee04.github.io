  <style>

    /* ── 1. Lock viewport, no scroll on homepage ── */
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    /* ── 2. Override ALL template hero styles ── */
    /* Template sets min-height, background-image, padding etc — reset everything */
    section#hero,
    section#hero.hero,
    section#hero.section,
    .index-page .hero {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      min-height: unset !important;
      padding: 0 !important;
      margin: 0 !important;
      background: none !important;
      background-image: none !important;
      display: flex !important;
      flex-direction: row !important;
      align-items: stretch !important;
      overflow: hidden !important;
    }

    /* ── 3. LEFT PANEL — 60% dark ── */
    .hero-left {
      width: 60% !important;
      flex-shrink: 0;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 5% 0 8%;
      position: relative;
      z-index: 2;
    }

    /* Diagonal edge blending into photo */
    .hero-left::after {
      content: '';
      position: absolute;
      top: 0;
      right: -38px;
      width: 76px;
      height: 100%;
      background: #0a0a0a;
      clip-path: polygon(0 0, 38px 0, 100% 100%, 0 100%);
      z-index: 3;
    }

    .hero-left h2 {
      font-size: clamp(2rem, 3.8vw, 3.2rem);
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 0.6rem;
      line-height: 1.15;
      letter-spacing: -0.5px;
    }

    .hero-left p {
      font-size: clamp(0.9rem, 1.6vw, 1.15rem);
      color: rgba(255,255,255,0.7);
      margin-bottom: 2rem;
    }

    .hero-left .typed {
      color: #27ae60;
    }

    .hero-left .typed-cursor {
      color: #27ae60;
    }

    .hero-social {
      display: flex;
      gap: 12px;
    }

    .hero-social a {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.7);
      font-size: 1.1rem;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .hero-social a:hover {
      border-color: #27ae60;
      color: #27ae60;
      background: rgba(39,174,96,0.1);
      transform: translateY(-2px);
    }

    /* ── 4. RIGHT PANEL — 40% photo ── */
    .hero-right {
      width: 40% !important;
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .hero-right img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 18%;
      display: block;
      filter: grayscale(10%) contrast(1.08) brightness(0.95);
    }

    /* Left edge gradient — blends photo into dark panel */
    .hero-right::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        #0a0a0a 0%,
        rgba(10,10,10,0.5) 25%,
        transparent 55%
      );
      z-index: 2;
      pointer-events: none;
    }

    /* Bottom fade */
    .hero-right::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100px;
      background: linear-gradient(to top, rgba(10,10,10,0.6), transparent);
      z-index: 2;
      pointer-events: none;
    }

    /* ── 5. Mobile ── */
    @media (max-width: 768px) {
      html, body { overflow: auto; }
      section#hero,
      section#hero.hero,
      section#hero.section,
      .index-page .hero {
        position: relative !important;
        flex-direction: column !important;
        height: auto !important;
        min-height: 100vh !important;
      }
      .hero-left {
        width: 100% !important;
        padding: 110px 8% 40px !important;
        min-height: 55vh;
      }
      .hero-left::after { display: none; }
      .hero-right {
        width: 100% !important;
        height: 55vw;
        min-height: 240px;
        max-height: 340px;
        position: relative;
      }
      .hero-right img {
        position: absolute;
      }
      .hero-right::before { display: none; }
    }
  </style>
</head>
